<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<link rel="stylesheet" href="./style.css">

<div id="app">
    <h1 :class="titleClass">{{message}}</h1>
    <p>Count is : {{counter.count}}</p>
    <button @click="increment">Increment</button>
    <button v-on:click="counter.count--">Decrement</button>

    <hr />

    <form>
        <input type="text" :value="inputVal" @input="inputVal = $event.target.value"
            placeholder="Type here => assigned through event" size="50" />
        <br />
        <br />
        <!-- <input type="text" :value="inputValThroughMethod" @input="onInput"
            placeholder="Type here => assigned through method" size="50" /> -->
        <input type="text" v-model="inputValThroughMethod" placeholder="Type here => assigned through method"
            size="50" />
    </form>
    <p><span style="font-weight: 700 ;">Changed through event :</span> {{inputVal}}</p>
    <p><span style="font-weight: 700 ;">Changed through method :</span> {{inputValThroughMethod}}</p>
</div>

<script>
    const { createApp } = Vue

    createApp({
        data() {
            return {
                message: '1st Declarative rendering withVue!',
                counter: {
                    count: 0
                },
                titleClass: 'title',
                inputVal: '',
                inputValThroughMethod: ''
            }
        },
        methods: {
            increment() {
                this.counter.count++
            },
            // onInput(e) {
            //     this.inputValThroughMethod = e.target.value;
            // }
        }
    }).mount('#app')

</script>
