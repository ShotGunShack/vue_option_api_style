<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<link rel="stylesheet" href="./style.css">

<div id="app">
    <h1 :class="titleClass">{{message}}</h1>
    <p>Count is : {{counter.count}}</p>
    <button @click="increment">Increment</button>
    <button v-on:click="counter.count--">Decrement</button>

    <hr />

    <form>
        <input type="text" :value="inputVal" @input="inputVal = $event.target.value" placeholder="Type here" />
    </form>
    <p>{{inputVal}}</p>
</div>

<script>
    const { createApp } = Vue

    createApp({
        data() {
            return {
                message: '1st Declarative rendering withVue!',
                counter: {
                    count: 0
                },
                titleClass: 'title',
                inputVal: ''
            }
        },
        methods: {
            increment() {
                this.counter.count++
            },

        }
    }).mount('#app')

</script>
